apiVersion: infrakube.galleybytes.com/v1
kind: Terraform
metadata:
  name: simple-template-example
  namespace: default
spec:
  terraformVersion: 1.0.0
  # Pull this module to execute
  terraformModule:
    source: https://github.com/cloudposse/terraform-example-module.git?ref=main

  images:
    terraform:
      image: ghcr.io/galleybytes/infrakube-task:latest

  # Use kubernetes as a backend which is available for terraform >= v0.13
  backend: |-
    terraform {
      backend "kubernetes" {
        secret_suffix    = "simple-template-example"
        in_cluster_config  = true
        namespace = "default"
      }
    }
  ignoreDelete: false

  setup:
    resourceDownloads:

    - address: https://github.com/cloudposse/terraform-example-module.git//examples/complete/fixtures.us-east-2.tfvars?ref=main
      useAsVar: true

    # # This downloads a big repo as part of the setup, but its just for demonstration
    # # When Running a debug pod on the system, one can see that lib from the k8s repo 
    # # are in the main module of the worker. It is commented out becuase it takes a
    # # a long time to download the repo.
    # - address: https://github.com/kubernetes/kubernetes.git//build/lib/

  # Create a tfvar env for the terraform to use
  taskOptions:
  - for:
    - '*' # The following config affects all task pods
    env:
    - name: TF_VAR_name
      value: simple-template
    - name: TF_VAR_environment
      value: example
    annotations:
      hello: infrakube

  scmAuthMethods: [] # No keys are required to download or use this tf module

