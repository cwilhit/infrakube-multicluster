name: CI

on:
  pull_request:
  push:
    branches:
    - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-integration:
    name: Unit and envtest
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run unit and integration tests
      run: make test

    - name: Check generated artifacts
      run: git diff --exit-code

  kind-smoke:
    name: Kind smoke
    runs-on: ubuntu-latest
    needs:
    - unit-and-integration
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Create kind cluster
      uses: helm/kind-action@v1.12.0

    - name: Build controller image
      run: docker build -t ghcr.io/galleybytes/infrakube:e2e -f build/Dockerfile .

    - name: Build task image
      run: make task-image-build TASK_IMAGE=ghcr.io/galleybytes/infrakube-task:e2e TASK_IMAGE_TARGETARCH=amd64

    - name: Load images into kind
      run: |
        kind load docker-image ghcr.io/galleybytes/infrakube:e2e
        kind load docker-image ghcr.io/galleybytes/infrakube-task:e2e

    - name: Run kind smoke test
      env:
        CONTROLLER_IMAGE: ghcr.io/galleybytes/infrakube:e2e
        TASK_IMAGE: ghcr.io/galleybytes/infrakube-task:e2e
      run: /bin/bash test/e2e/kind-smoke.sh
