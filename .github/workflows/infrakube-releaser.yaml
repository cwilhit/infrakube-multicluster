name: Build Infrakube Container Image

on:
  pull_request:
    branches:
    - master
  push:
    tags:
    - 'infrakube-*'
    - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  infrakube-image-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine image tags
      id: meta
      run: |
        CACHE_HASH="$(
          {
            printf '%s\n' build/Dockerfile main.go go.mod go.sum
            find build/scripts cmd pkg -type f | sort
          } | while IFS= read -r file; do
            shasum -a 256 "$file"
          done | shasum -a 256 | awk '{print $1}'
        )"
        CACHE_TAG="0.0.0-buildcache-${CACHE_HASH}"
        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          BUILD_SHA="${{ github.event.pull_request.head.sha }}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/galleybytes/infrakube:${CACHE_TAG}"
            echo "ghcr.io/galleybytes/infrakube:0.0.0-${BUILD_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        else
          TAG=${GITHUB_REF#refs/tags/}
          case "${TAG}" in
            infrakube-*)
              VERSION=${TAG#infrakube-}
              ;;
            v*)
              VERSION=${TAG#v}
              ;;
            *)
              echo "Unsupported release tag: ${TAG}" >&2
              exit 1
              ;;
          esac
          {
            echo "tags<<EOF"
            echo "ghcr.io/galleybytes/infrakube:${CACHE_TAG}"
            echo "ghcr.io/galleybytes/infrakube:latest"
            echo "ghcr.io/galleybytes/infrakube:${VERSION}"
            echo "ghcr.io/galleybytes/infrakube:0.0.0-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi
        echo "cache_tag=ghcr.io/galleybytes/infrakube:${CACHE_TAG}" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set up GitHub Actions cache runtime
      uses: crazy-max/ghaction-github-runtime@v3

    - name: Log in to registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Check cached controller image
      id: cache
      run: |
        if docker buildx imagetools inspect "${{ steps.meta.outputs.cache_tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Reuse cached controller image
      if: steps.cache.outputs.exists == 'true'
      run: |
        create_args=()
        while IFS= read -r tag; do
          if [[ "${tag}" != "${{ steps.meta.outputs.cache_tag }}" ]]; then
            create_args+=(--tag "${tag}")
          fi
        done <<< "${{ steps.meta.outputs.tags }}"
        docker buildx imagetools create "${create_args[@]}" "${{ steps.meta.outputs.cache_tag }}"

    - name: Build and push multi-architecture images
      if: steps.cache.outputs.exists != 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: build/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha,scope=infrakube
        cache-to: type=gha,mode=max,scope=infrakube
